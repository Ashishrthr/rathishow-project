<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      /* Keep styles inline-friendly and simple for email clients */
      *{margin: 0 auto; padding: 0;}
      body { background: #ffffff; font-family: Arial, Helvetica, sans-serif; color: #111; margin:0; padding:0; }
      .wrapper { display:flex; justify-content:center; padding:28px 0; }
      .card { width:640px; max-width:94%; border-radius:6px; border:1px solid #e6e6e6; padding:32px; box-sizing:border-box; }
      .header { text-align:center; margin-bottom:18px; }
      .title { font-size:16px; color:#222; margin: 6px 0 14px; }
      .content { font-size:14px; color:#333; line-height:1.5; }
      .bullets { margin:12px 0 16px; padding-left:18px; }
      .footer { font-size:12px; color:#888; border-top:1px solid #eee; margin-top:18px; padding-top:14px; }
      a { color:#1a73e8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="header">
          <!-- header image attached inline as cid:header.png -->
          <img src="cid:logo_cid" alt="Logo" style="width:150px;height:60px;display:block;margin:0 auto 12px;" />
          <div class="title">🎟️ New Show Added  🎟️</div>
        </div>

        <div class="content">
            <div style="max-width:  500px; padding: 5px;margin: 0 auto; box-shadow: 1px 1px 2px black;"> 
                <div style="width: 100%;">
                    <img src="cid:poster_cid" style="width: 100%;" alt="">
                </div>
                <div>
                    <p>Show Name :  <strong>{{movie_name}}</strong> </p>
                    <p>Show Date & Time:  <strong>{{movie_date}} &  {{movie_time}}</strong></p>
                </div>
           
            </div>
        </div>

        <div class="footer">
          <p>If you've got questions, ask us in our community.</p>
          <p>&copy; 2025 RathShow. All rights reserved.</p>
        </div>
      </div>
    </div>
  </body>
</html>
